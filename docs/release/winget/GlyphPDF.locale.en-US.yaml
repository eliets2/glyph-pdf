ShortDescription: Open-source privacy-first PDF workstation for Windows
Description: >-
  GlyphPDF is a full-featured, open-source PDF workstation for Windows.
  It provides secure redaction with glyph-advance normalization (Edact-Ray defense),
  PAdES B-LT/B-LTA digital signatures, MRC layered compression (30x ratio),
  parallel OCR with PP-DocLayoutV2 + Tesseract + RapidOCR ROVER fusion,
  Djot document interchange, AI assistant (Anthropic/OpenAI/Gemini/Ollama),
  and a full-featured batch processing and form builder mode.
  No telemetry. No cloud upload. No subscription. Apache-2.0 licensed.
