name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # Pin to windows-2022 — windows-latest redirects to windows-2025-vs2026 (beta)
    # which has MSYS2 compatibility issues. Re-evaluate when windows-2025 is stable.
    runs-on: windows-2022

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up MSYS2 ucrt64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-qt6-svg
            mingw-w64-ucrt-x86_64-qt6-translations
            mingw-w64-ucrt-x86_64-qt6-imageformats
            mingw-w64-ucrt-x86_64-qt6-pdf
            mingw-w64-ucrt-x86_64-podofo
            mingw-w64-ucrt-x86_64-qpdf
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-tesseract-ocr
            mingw-w64-ucrt-x86_64-tesseract-data-eng
            mingw-w64-ucrt-x86_64-leptonica
            mingw-w64-ucrt-x86_64-libzip
            mingw-w64-ucrt-x86_64-libxml2
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-zlib
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-libtiff
            mingw-w64-ucrt-x86_64-openjpeg2
            mingw-w64-ucrt-x86_64-fontconfig

      # The codebase requires podofo 1.1.0 (accessor API on PdfContent etc.).
      # MSYS2 ships an older podofo, so build 1.1.0 from source into the
      # vendored prefix that CMakeLists.txt auto-detects. Cached across runs.
      - name: Restore vendored podofo cache
        id: podofo-cache
        uses: actions/cache@v4
        with:
          path: third_party/podofo/install
          key: podofo-1.1.0-ucrt64-r1

      - name: Build vendored podofo 1.1.0
        if: steps.podofo-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 1.1.0 https://github.com/podofo/podofo.git podofo-src
          cmake -S podofo-src -B podofo-src/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPODOFO_BUILD_TOOLS=OFF \
            -DPODOFO_BUILD_TEST=OFF \
            -DPODOFO_BUILD_EXAMPLES=OFF \
            -DCMAKE_INSTALL_PREFIX="$PWD/third_party/podofo/install"
          cmake --build podofo-src/build --parallel
          cmake --install podofo-src/build

      # Download ONNX Runtime 1.17.3 — gitignored binary, required for HAS_RAPIDOCR
      - name: Download ONNX Runtime
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.17.3/onnxruntime-win-x64-1.17.3.zip"
          Invoke-WebRequest -Uri $url -OutFile ort.zip -TimeoutSec 180
          $expected = "356A33D024F2709786BEBD5D4CA06CD5392875DA95DAA0455AAE72EDC8993256"
          $actual = (Get-FileHash ort.zip -Algorithm SHA256).Hash
          if ($actual -ne $expected) { Write-Error "ORT checksum mismatch"; exit 1 }
          Expand-Archive -Path ort.zip -DestinationPath . -Force
          Remove-Item ort.zip
          Write-Host "ORT extracted to: $((Get-Item onnxruntime-win-x64-1.17.3).FullName)"

      # Download the PDFium runtime DLL — matches the vendored import lib
      # (chromium/7834, see third_party/pdfium/PROVENANCE.md). Gitignored binary.
      - name: Download PDFium runtime DLL
        shell: pwsh
        run: |
          $url = "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7834/pdfium-win-x64.tgz"
          Invoke-WebRequest -Uri $url -OutFile pdfium.tgz -TimeoutSec 180
          New-Item -ItemType Directory -Force pdfium-extract | Out-Null
          tar -xzf pdfium.tgz -C pdfium-extract
          $expected = "A487E1D2A18F164ADC3A17AACEE158787FA86049E6D91D3712B0A43F745E6905"
          $actual = (Get-FileHash pdfium-extract/bin/pdfium.dll -Algorithm SHA256).Hash
          if ($actual -ne $expected) { Write-Error "pdfium.dll checksum mismatch: $actual"; exit 1 }
          New-Item -ItemType Directory -Force third_party/pdfium/bin | Out-Null
          Copy-Item pdfium-extract/bin/pdfium.dll third_party/pdfium/bin/pdfium.dll
          Remove-Item pdfium.tgz; Remove-Item -Recurse -Force pdfium-extract
          Write-Host "pdfium.dll staged at third_party/pdfium/bin/"

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        # ONNX model files (models/) are gitignored — tests that need them QSKIP gracefully
        run: |
          cd build
          QT_QPA_PLATFORM=offscreen ctest --output-on-failure -j4
