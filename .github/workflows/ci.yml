name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 ucrt64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          pacboy: >-
            toolchain:u
            cmake:u
            ninja:u
            pkgconf:u
            qt6-base:u
            qt6-tools:u
            qt6-svg:u
            qt6-translations:u
            qt6-imageformats:u
            qt6-pdf:u
            podofo:u
            qpdf:u
            openssl:u
            tesseract-ocr:u
            tesseract-data-eng:u
            leptonica:u
            libxml2:u
            freetype:u
            zlib:u
            curl:u
            libpng:u
            libjpeg-turbo:u
            libtiff:u
            openjpeg2:u

      # Download ONNX Runtime 1.17.3 (gitignored; required for HAS_RAPIDOCR)
      - name: Download ONNX Runtime
        shell: pwsh
        run: |
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.17.3/onnxruntime-win-x64-1.17.3.zip"
          $zip = "ort.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -TimeoutSec 120
          Expand-Archive -Path $zip -DestinationPath . -Force
          Remove-Item $zip
          Write-Host "ORT extracted: $(Get-ChildItem onnxruntime-win-x64-1.17.3 | Select-Object -First 3)"

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        # Models (ONNX weights) are gitignored — TestRapidOcr + TestMrcPipeline will
        # QSKIP model-dependent cases gracefully; all other 30 tests must pass.
        run: |
          cd build
          QT_QPA_PLATFORM=offscreen ctest --output-on-failure -j4
